name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orders_test
          POSTGRES_USER: orders
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, pdo_sqlite, sqlite3, mbstring, exif, pcntl, bcmath, gd, zip, intl, redis
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Configure test environment
        run: |
          echo "APP_KEY=" >> .env
          php artisan key:generate
          sed -i 's/DB_HOST=postgres/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=orders/DB_DATABASE=orders_test/' .env
          sed -i 's/REDIS_HOST=redis/REDIS_HOST=127.0.0.1/' .env

      - name: Create storage directories
        run: |
          mkdir -p storage/framework/{cache,sessions,views}
          mkdir -p storage/logs
          mkdir -p bootstrap/cache

      - name: Run migrations
        run: php artisan migrate --force

      - name: Apply versioned seeds
        run: php artisan db:seed --force

      - name: Code style (Duster)
        run: ./vendor/bin/duster lint

      - name: Static analysis (Larastan)
        run: ./vendor/bin/phpstan analyse --memory-limit=512M --no-progress

      - name: Tests (Pest)
        run: ./vendor/bin/pest --no-coverage
