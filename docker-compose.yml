services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orders-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - orders-network

  nginx:
    image: nginx:alpine
    container_name: orders-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - orders-network

  postgres:
    image: postgres:16-alpine
    container_name: orders-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    networks:
      - orders-network

  redis:
    image: redis:alpine
    container_name: orders-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - orders-network

networks:
  orders-network:
    driver: bridge

volumes:
  pgsql-data:
