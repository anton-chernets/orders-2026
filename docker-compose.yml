services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orders-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - orders-network

  nginx:
    image: nginx:alpine
    container_name: orders-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - orders-network

  mysql:
    image: mysql:8.0
    container_name: orders-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: orders
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: orders
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - orders-network

  redis:
    image: redis:alpine
    container_name: orders-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - orders-network

networks:
  orders-network:
    driver: bridge

volumes:
  mysql-data:
